<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SA Extension B — 신뢰·금융 톤</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 600px; height: 600px;
    overflow: hidden;
    font-family: 'Pretendard Variable', -apple-system, sans-serif;
  }
  .wrap {
    width: 600px; height: 600px;
    background: linear-gradient(160deg, #0a1f44 0%, #122d5c 60%, #0a1f44 100%);
    color: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 50px 56px;
  }
  .glow {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.08), transparent 70%);
    bottom: -20%; left: -15%;
    filter: blur(80px);
    pointer-events: none;
  }
  /* 미세한 라인 패턴 (금융 문서 톤) */
  .lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    pointer-events: none;
  }
  /* Top */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(212, 175, 55, 0.12);
    color: #d4af37;
    padding: 10px 18px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    border: 1px solid rgba(212, 175, 55, 0.35);
    align-self: flex-start;
    position: relative;
    z-index: 1;
    letter-spacing: 0.05em;
  }
  /* 메인 */
  .main {
    position: relative;
    z-index: 1;
  }
  .lead {
    font-size: 18px;
    color: rgba(255, 255, 255, 0.7);
    font-weight: 500;
    margin-bottom: 14px;
    letter-spacing: -0.01em;
  }
  h1 {
    font-size: 78px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.04em;
    color: #d4af37;
    margin-bottom: 14px;
  }
  .sub {
    font-size: 24px;
    color: #fff;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .divider {
    width: 60px;
    height: 2px;
    background: #d4af37;
    margin: 24px 0 20px;
  }
  /* 신뢰 지표 */
  .trust-row {
    display: flex;
    gap: 28px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }
  .trust-item {
    color: rgba(255, 255, 255, 0.85);
    font-size: 13px;
    font-weight: 600;
  }
  .trust-item strong {
    color: #d4af37;
    font-weight: 800;
    margin-right: 4px;
  }
  /* 하단 */
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .speedy-logo {
    height: 30px;
    width: auto;
    opacity: 0.95;
  }
  .partner {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 600;
    text-align: right;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="lines"></div>
  <div class="glow"></div>
  <div class="badge">NHN CLOUD PLATINUM PARTNER</div>
  <div class="main">
    <div class="lead">검증된 클라우드 파트너의 공식 지원금</div>
    <h1>5,400만원</h1>
    <div class="sub">NHN Cloud 스타트업 크레딧</div>
    <div class="divider"></div>
    <div class="trust-row">
      <div class="trust-item"><strong>7년+</strong> 운영 레퍼런스</div>
      <div class="trust-item"><strong>98%</strong> 재계약률</div>
    </div>
  </div>
  <div class="bottom">
    <img src="speedy-logo-white.png" alt="Speedy" class="speedy-logo">
    <div class="partner">전담 컨설턴트 1:1 매칭<br>24시간 한국어 기술지원</div>
  </div>
</div>
</body>
</html>
