<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SA Extension A — 파트너십 권위</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 600px; height: 600px;
    overflow: hidden;
    font-family: 'Pretendard Variable', -apple-system, sans-serif;
  }
  .wrap {
    width: 600px; height: 600px;
    background: linear-gradient(160deg, #ffffff 0%, #eff5ff 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 50px 56px;
  }
  .glow {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(22, 93, 245, 0.15), transparent 70%);
    top: -10%; right: -15%;
    filter: blur(60px);
    pointer-events: none;
  }
  /* Top: 권위 뱃지 */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(22, 93, 245, 0.08);
    color: #165df5;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    border: 1.5px solid rgba(22, 93, 245, 0.2);
    align-self: flex-start;
    position: relative;
    z-index: 1;
  }
  .badge .dot {
    width: 7px; height: 7px;
    background: #165df5;
    border-radius: 50%;
  }
  /* 메인 카피 */
  .main {
    position: relative;
    z-index: 1;
  }
  .lead {
    font-size: 19px;
    color: #4b5563;
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  h1 {
    font-size: 78px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.04em;
    color: #165df5;
    margin-bottom: 12px;
  }
  .sub {
    font-size: 24px;
    color: #171717;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  /* 하단 */
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .speedy-logo {
    height: 32px;
    width: auto;
  }
  .partner {
    font-size: 12px;
    color: #71717a;
    font-weight: 600;
    text-align: right;
    line-height: 1.5;
  }
  .partner strong { color: #165df5; }
</style>
</head>
<body>
<div class="wrap">
  <div class="glow"></div>
  <div class="badge"><span class="dot"></span>NHN Cloud Platinum Partner</div>
  <div class="main">
    <div class="lead">스타트업이라면 받을 수 있는</div>
    <h1>최대 5,400만원</h1>
    <div class="sub">NHN Cloud 크레딧 지원</div>
  </div>
  <div class="bottom">
    <img src="speedy-logo-blue.png" alt="Speedy" class="speedy-logo">
    <div class="partner">스피디 전담 컨설턴트<br><strong>1분 무료 상담</strong></div>
  </div>
</div>
</body>
</html>
